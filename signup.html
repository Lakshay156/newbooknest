<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | BookNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .btn-gradient { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); transition: all 0.3s ease; }
    .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50 relative overflow-x-hidden py-12">
  <!-- Soft background element -->
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-orange-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 -translate-y-1/2 translate-x-1/3"></div>
  <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-amber-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 translate-y-1/3 -translate-x-1/4"></div>

  <div class="relative z-10 w-full max-w-lg px-4">
    <div class="bg-white/80 backdrop-blur-2xl p-8 sm:p-12 rounded-[2.5rem] shadow-2xl border border-white/50">
        <h1><a href="index.php"><img src="https://i.ibb.co/Kc0pZmw6/logo-no-background.png" alt="booknest" class="mx-auto w-48 mb-6"></a></h1>
      <h2 class="text-3xl font-extrabold text-center text-slate-800 mb-8">Create Account</h2>
      <form id="registerForm" action="signup.php" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">First Name</label>
          <input type="text" name="firstname" class="w-full border rounded px-3 py-2 transition duration-200 ease-in-out hover:shadow-md"placeholder="Enter your first name" required />
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Last Name</label>
            <input type="text" name="lastname" class="w-full border rounded px-3 py-2 transition duration-200 ease-in-out hover:shadow-md" placeholder="Enter your last name" required />
          </div>
        <div>
          <label class="block text-sm font-medium mb-1">Mobile Number</label>
          <div class="flex">
            <span class="inline-flex items-center px-3 text-gray-600 bg-gray-200 border border-r-0 rounded-l">
              +91
            </span>
            <input type="tel" name="mobile" pattern="[0-9]{10}" maxlength="10" class="w-full border rounded-r px-3 py-2 transition duration-200 ease-in-out hover:shadow-md" placeholder="Enter your mobile number" required />
        </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" name="email" class="w-full border rounded px-3 py-2 transition duration-200 ease-in-out hover:shadow-md"placeholder="Enter your email" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1"c >Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password"
                 class="w-full border rounded px-3 py-2 transition duration-200 ease-in-out hover:shadow-md" 
                 pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}" 
                 title="Password must be at least 8 characters and include one uppercase letter, one lowercase letter, one number, and one special character." 
                 required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password"
                 class="w-full border rounded px-3 py-2 transition duration-200 ease-in-out hover:shadow-md" 
                 required />
        </div>
        <button type="submit" class="w-full btn-gradient text-white py-3 rounded-xl font-bold shadow-lg text-lg mt-6">
          Register
        </button>
      </form>
      <p class="text-center mt-6 text-sm font-medium text-slate-600">Already have an account? <a href="login.html" class="text-orange-600 hover:text-orange-700 font-bold border-b border-transparent hover:border-orange-600 transition">Login</a></p>
    </div>
  </div>

  <script>
    // Client-side validation for password match
    const registerForm = document.getElementById('registerForm');
    registerForm.addEventListener('submit', function(e) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      if (password !== confirmPassword) {
        e.preventDefault();
        alert('Passwords do not match. Please re-enter.');
      }
    });
  </script>
</body>
</html>
