<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | BookNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .btn-gradient { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); transition: all 0.3s ease; }
    .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-50 relative overflow-hidden">
  <!-- Soft background element -->
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-orange-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 -translate-y-1/2 translate-x-1/3"></div>
  <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-amber-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10 translate-y-1/3 -translate-x-1/4"></div>

  <div class="relative z-10 w-full max-w-md px-6">
    <div class="bg-white/80 backdrop-blur-2xl p-10 rounded-[2rem] shadow-2xl border border-white/50">
        <h1><a href="index.php"><img src="https://i.ibb.co/Kc0pZmw6/logo-no-background.png" alt="booknest" class="mx-auto w-48 mb-8" ></a></h1>
      <h2 class="text-3xl font-extrabold text-center text-slate-800 mb-8">Welcome Back</h2>
      <form action="login.php" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" name="email" class="w-full border rounded px-3 py-2" required />
        </div>
        <div class="relative">
          <label class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="password" name="password" class="w-full border rounded px-3 py-2 pr-10" 
                 pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}" 
                 title="Password must be at least 8 characters and include one uppercase letter, one lowercase letter, one number, and one special character." 
                 required />
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-8 text-slate-400 hover:text-slate-600 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </button>
        </div>
        <button type="submit" class="w-full btn-gradient text-white py-3 rounded-xl font-bold shadow-lg text-lg mt-4">
          Login Account
        </button>
      </form>
      <p class="text-center mt-6 text-sm font-medium text-slate-600">Don’t have an account? <a href="signup.html" class="text-orange-600 hover:text-orange-700 font-bold border-b border-transparent hover:border-orange-600 transition">Register</a></p>
    </div>
  </div>
  <script>
    function togglePassword() {
      const pass = document.getElementById('password');
      if (pass.type === 'password') {
          pass.type = 'text';
      } else {
          pass.type = 'password';
      }
    }
  </script>
</body>
</html>
